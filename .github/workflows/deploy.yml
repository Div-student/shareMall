name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          pnpm build:shared
          pnpm build:server
          pnpm build:h5
          pnpm build:admin

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'apps/h5/dist,apps/admin/dist,apps/server/Dockerfile,apps/server/migrations,docker-compose.prod.yml,deploy,package.json,pnpm-lock.yaml,pnpm-workspace.yaml,packages'
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      - name: Restart containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose --env-file deploy/.env.production -f docker-compose.prod.yml up -d --build
            docker image prune -f
